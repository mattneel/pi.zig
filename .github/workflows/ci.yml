name: CI

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.os }}, ${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
          - os: ubuntu-24.04-arm
            arch: arm64
          - os: macos-latest
            arch: arm64
          # macos-15-intel is absent: setup-anyzig has no macOS-X64 case, so
          # the install step fails there. Upstream anyzig does publish
          # anyzig-x86_64-macos.tar.gz, so this is a gap in the action rather
          # than a real platform limit. The cross job below still proves
          # x86_64-macos builds, and release artifacts for it are produced by
          # cross-compiling from Linux.
          #
          # Windows is absent for a harder reason: tuizr's Terminal is
          # POSIX-only. `output_fd: std.posix.fd_t = std.posix.STDOUT_FILENO`
          # does not compile for windows targets, where fd_t is a *anyopaque
          # HANDLE rather than an integer, and platform/linux.zig is imported
          # unconditionally. Windows needs a console backend in tuizr first.

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # anyzig resolves the compiler version from minimum_zig_version in
      # build.zig.zon (currently 0.16.0), matching local development exactly.
      - name: Install Zig
        uses: mattneel/setup-anyzig@v1
        with:
          cache-key: ${{ matrix.arch }}

      # setup-anyzig caches only the compiler downloads and the global package
      # cache. Compiled objects live in the project-local .zig-cache, and
      # without this every run recompiles from scratch: a cold `zig build test`
      # spends ~21s compiling pi-tests versus ~33ms when cached, and the test
      # binary is a separate compilation from the executable, so nothing the
      # build step produces helps it.
      - name: Cache compiled objects
        uses: actions/cache@v4
        with:
          path: .zig-cache
          key: zig-cache-test-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('build.zig', 'build.zig.zon') }}-${{ github.sha }}
          restore-keys: |
            zig-cache-test-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('build.zig', 'build.zig.zon') }}-
            zig-cache-test-${{ runner.os }}-${{ runner.arch }}-

      - name: Toolchain info
        run: |
          zig any version
          zig version

      # This also links the executable's modules natively, so a separate
      # `zig build` step here would duplicate the cross job for no extra
      # coverage.
      - name: Run tests
        run: zig build test --summary all

  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Zig
        uses: mattneel/setup-anyzig@v1

      - name: Check formatting
        run: zig fmt --check build.zig src

  cross:
    name: Cross-compile (${{ matrix.target }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-linux-gnu
          - aarch64-linux-gnu
          - x86_64-macos
          - aarch64-macos

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Zig
        uses: mattneel/setup-anyzig@v1
        with:
          cache-key: ${{ matrix.target }}

      - name: Cache compiled objects
        uses: actions/cache@v4
        with:
          path: .zig-cache
          key: zig-cache-cross-${{ matrix.target }}-${{ hashFiles('build.zig', 'build.zig.zon') }}-${{ github.sha }}
          restore-keys: |
            zig-cache-cross-${{ matrix.target }}-${{ hashFiles('build.zig', 'build.zig.zon') }}-
            zig-cache-cross-${{ matrix.target }}-

      # Guards the release target set: every artifact release.yml ships must
      # keep cross-compiling from Linux.
      - name: Build release target
        run: zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseSafe --summary all
